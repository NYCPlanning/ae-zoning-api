get:
  summary: Find facility categories
  operationId: findFacilityCategories
  tags:
    - Facilities
  responses:
    '200':
      description: A list of categories, groups, and subgroups
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/FacilityCategory.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
