get:
  summary: Find facility categories
  operationId: findFacilityCategories
  tags:
    - Facilities
  responses:
    '200':
      description: An object containing a list of categories, groups, and subgroups
      content:
        application/json:
          schema:
            type: object
            properties:
              facilityCategories:
                type: array
                items:
                  $ref: ../components/schemas/FacilityCategory.yaml
            required:
              - facilityCategories
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
