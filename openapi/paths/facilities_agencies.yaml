get:
  summary: Find facility agencies
  operationId: findFacilityAgencies
  tags:
    - Agencies
    - Facilities
  responses:
    '200':
      description: An array of agencies
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/Agency.yaml
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
