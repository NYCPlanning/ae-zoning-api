get:
  summary: Find facility agencies
  operationId: findFacilityAgencies
  tags:
    - Agencies
    - Facilities
  responses:
    '200':
      description: An object containing a list of agencies
      content:
        application/json:
          schema:
            type: object
            properties:
              facilityAgencies:
                type: array
                items:
                  $ref: ../components/schemas/Agency.yaml
            required:
              - facilityAgencies
    '400':
      $ref: ../components/responses/BadRequest.yaml
    '500':
      $ref: ../components/responses/InternalServerError.yaml
