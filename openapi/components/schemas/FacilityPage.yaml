allOf:
  - $ref: ./Page.yaml
  - type: object
    properties:
      facilities:
        type: array
        items:
          type: object
          properties:
            id:
              type: string
              description: The id for the facility or program.
              example: 1435f9fd9f0787a5038b15512bb9684f
            name:
              type: string
              description: The name of the facility or program.
              example: 'QUEENSBORO OVAL'
              nullable: true
            oversightAgencyInitials:
              type: string
              description: The name of the agency overseeing the facility or program.
              example: 'NYCDPR'
              nullable: true
            categoryId:
              type: integer
              description: The category id of the facility
              example: 1
          required:
            - id
            - categoryId
      totalFacilities:
        type: integer
        description: >-
          The total number of results matching the query parameters.
        minimum: 0
        example: 212
    required:
      - facilities
      - totalFacilities

