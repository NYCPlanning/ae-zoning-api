type: object
properties:
  initials:
    type: string
    description: A string of variable length containing the initials of the agency.
    example: DOT
  name:
    type: string
    description: The full name of the agency.
    example: Department of Transportation
  oversightLevel:
    $ref: ./AgencyOversightLevel.yaml
    nullable: true
required:
  - initials
  - name
