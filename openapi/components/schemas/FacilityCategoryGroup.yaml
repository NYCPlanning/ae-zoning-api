type: object
properties:
  id:
    type: string
    pattern: ^([0-9]{1,3})$
    description: The id for the group.
    example: '1'
  name:
    type: string
    description: The name of the group.
    example: Schools (K-12)
  description:
    type: string
    description: The description of the group.
    example: Schools (K-12)
    nullable: true
  subgroups:
    type: array
    items:
      $ref: ./FacilityCategorySubgroup.yaml
required:
  - id
  - name
  - description
  - subgroups